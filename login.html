<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - MindSpark</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .auth-header p {
            margin: 0;
            font-size: 0.95em;
            opacity: 0.9;
        }

        .auth-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            padding: 12px 15px;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .form-label {
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .btn-signin {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 5px;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 500;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #999;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            background: #e0e0e0;
            height: 1px;
        }

        .divider span {
            margin: 0 10px;
            font-size: 0.9em;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
        }

        .social-btn {
            flex: 1;
            border: 2px solid #e0e0e0;
            background: white;
            color: #333;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .alert {
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .loading {
            display: none;
        }
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>MindSpark</h1>
            <p>Welcome back! Let's continue your journey</p>
        </div>

        <div class="auth-body">
            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        name="email"
                        placeholder="you@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        name="password"
                        placeholder="••••••••"
                        required
                    >
                </div>

                <div class="forgot-password">
                    <a href="#" onclick="handleForgotPassword(event)">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-signin">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner-border spinner-border-sm loading ms-2" role="status" aria-hidden="true"></span>
                </button>
            </form>

            <div class="divider">
                <span>Don't have an account?</span>
            </div>

            <div class="auth-footer">
                <a href="signup.html" class="d-block mb-3">Create a new account</a>
            </div>
        </div>
    </div>

    <!-- Firebase Configuration & Modules -->
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-auth.js"></script>
    <script src="js/utils.js"></script>

    <script>
        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Validation
            if (!Utils.isValidEmail(email)) {
                Utils.showError('Please enter a valid email address');
                return;
            }

            if (!password) {
                Utils.showError('Please enter your password');
                return;
            }

            // Show loading state
            document.querySelector('.btn-text').style.display = 'none';
            document.querySelector('.loading').style.display = 'inline-block';

            try {
                await AuthManager.loginUser(email, password);
                Utils.showSuccess('Signed in successfully! Redirecting...');
                setTimeout(() => {
                    Utils.redirectTo('dashboard.html');
                }, 1500);

            } catch (error) {
                Utils.showError(error.message);
                document.querySelector('.btn-text').style.display = 'inline';
                document.querySelector('.loading').style.display = 'none';
            }
        });

        // Handle password reset
        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();

            if (!email) {
                Utils.showError('Please enter your email address first');
                return;
            }

            try {
                await AuthManager.sendPasswordResetEmail(email);
                Utils.showSuccess('Password reset email sent! Check your inbox.');
            } catch (error) {
                Utils.showError(error.message);
            }
        }
    </script>
</body>
</html>
