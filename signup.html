<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MindSpark</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .auth-header p {
            margin: 0;
            font-size: 0.95em;
            opacity: 0.9;
        }

        .auth-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            padding: 12px 15px;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .form-label {
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .btn-signup {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 5px;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .form-text {
            font-size: 0.85em;
            color: #999;
        }

        .password-strength {
            margin-top: 10px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }

        .alert {
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .loading {
            display: none;
        }
    </style>

    <!-- GitHub OAuth Configuration -->
    <script>
        // Set your backend URL here
        window.BACKEND_URL = 'http://localhost:5000';
    </script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>MindSpark</h1>
            <p>Join our community of young achievers</p>
        </div>

        <div class="auth-body">
            <div id="alertContainer"></div>

            <div class="form-group">
                <button type="button" class="btn btn-signup" onclick="handleGitHubSignup()" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <i class="fab fa-github"></i>
                    <span class="btn-text">Sign Up with GitHub</span>
                    <span class="spinner-border spinner-border-sm loading ms-2" role="status" aria-hidden="true"></span>
                </button>
            </div>

            <p class="text-center text-muted mt-4" style="font-size: 0.9em;">
                We use your GitHub account for secure authentication. Your profile information will be safely stored in your GitHub repository.
            </p>

            <div class="auth-footer">
                <p class="mb-0">Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <!-- GitHub Auth Module -->
    <script src="js/github-auth.js"></script>
    <script src="js/utils.js"></script>

    <script>
        // Handle GitHub signup
        function handleGitHubSignup() {
            const btnText = document.querySelector('.btn-text');
            const spinner = document.querySelector('.loading');
            
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';

            try {
                GitHubAuthManager.initiateGitHubLogin();
            } catch (error) {
                Utils.showError('Failed to initiate signup: ' + error.message);
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
            }
        }

        // Check if already logged in
        window.addEventListener('load', async () => {
            if (GitHubAuthManager.isAuthenticated()) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
